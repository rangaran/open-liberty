description=Ez a funkci\u00f3 lehet\u0151v\u00e9 teszi a Jakarta Server Pages 4.1 specifik\u00e1ci\u00f3 szerint \u00edrt Jakarta Server Pages f\u00e1jlok t\u00e1mogat\u00e1s\u00e1t. Ez a keretrendszer egyszer\u0171s\u00edti a felhaszn\u00e1l\u00f3i fel\u00fclet \u00f6ssze\u00e1ll\u00edt\u00e1s\u00e1t. A funkci\u00f3 enged\u00e9lyez\u00e9s\u00e9vel a Jakarta Expression Language ( 6.1 ) funkci\u00f3 is aktiv\u00e1l\u00f3dik.
