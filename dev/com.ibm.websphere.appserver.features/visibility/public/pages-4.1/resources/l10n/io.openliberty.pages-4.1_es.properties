description=Esta funci\u00f3n permite la compatibilidad con las p\u00e1ginas de servidor de Jakarta (Jakarta Server Pages) que se han escrito de acuerdo con la especificaci\u00f3n \u00ab 4.1 \u00bb de Jakarta Server Pages. Esta infraestructura simplifica la construcci\u00f3n de interfaces de usuario. Al activar esta funci\u00f3n, tambi\u00e9n se activa la funci\u00f3n \u00ab 6.1 \u00bb del lenguaje de expresiones de Jakarta.
