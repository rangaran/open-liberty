description=Aceast\u0103 func\u021bionalitate permite suportul pentru servletele de tip \u201e HTTP \u201d (servlet de tip \u201e\u201d) scrise conform specifica\u021biei Jakarta Servlet 6.2. Pute\u0163i \u00eempacheta servleturi \u00een fi\u015fierele WAR sau EAR specificate \u00een Jakarta EE.  Dac\u0103 este necesar\u0103 securitatea servletului, ar trebui de asemenea s\u0103 configura\u0163i o caracteristic\u0103 appSecurity. F\u0103r\u0103 o caracteristic\u0103 de securitate, constr\u00e2ngerile de securitate pentru aplica\u0163ie sunt ignorate.
