description=Cette fonctionnalit\u00e9 permet la prise en charge des servlets \u00ab HTTP \u00bb (servlets de gestion de la s\u00e9curit\u00e9) conformes \u00e0 la sp\u00e9cification \u00ab Jakarta Servlet 6.2 \u00bb. Vous pouvez conditionner les servlets dans des fichiers WAR ou EAR Jakarta EE.  Si la s\u00e9curit\u00e9 de servlet est requise, vous devez aussi configurer une fonction appSecurity. Sans fonction de s\u00e9curit\u00e9, les contraintes de s\u00e9curit\u00e9 pour l'application sont ignor\u00e9es.
