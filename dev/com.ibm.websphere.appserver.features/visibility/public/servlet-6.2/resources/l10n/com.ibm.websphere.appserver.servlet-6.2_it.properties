description=Questa funzionalit\u00e0 consente il supporto dei servlet " HTTP " scritti secondo la specifica "Jakarta Servlet 6.2 ". \u00c8 possibile impacchettare i servlet in file WAR o EAR specificati da Jakarta EE.  Se \u00e8 necessaria la protezione dei servlet occorre configurare anche la funzione appSecurity. Senza una funzione di sicurezza qualsiasi vincolo di sicurezza per l'applicazione verr\u00e0 ignorato.
