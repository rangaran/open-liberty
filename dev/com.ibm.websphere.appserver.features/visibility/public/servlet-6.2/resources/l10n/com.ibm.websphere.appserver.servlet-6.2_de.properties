description=Diese Funktion erm\u00f6glicht die Unterst\u00fctzung von \u201e HTTP \u201c-Servlets, die gem\u00e4\u00df der Jakarta-Servlet- 6.2 -Spezifikation geschrieben wurden. Sie k\u00f6nnen Servlets in WAR- oder EAR-Dateien packen, f\u00fcr die Jakarta EE angegeben ist.  Wenn die Servletsicherheit erforderlich ist, m\u00fcssen Sie auch ein an appSecurity-Feature konfigurieren. Ohne Sicherheitsfeature werden alle Sicherheitsvorgaben f\u00fcr die Anwendung ignoriert.
