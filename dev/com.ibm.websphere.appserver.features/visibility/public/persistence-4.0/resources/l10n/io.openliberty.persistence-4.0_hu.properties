description=Ez a szolg\u00e1ltat\u00e1s az alkalmaz\u00e1salap\u00fa \u00e9s t\u00e1rol\u00f3alap\u00fa meg\u0151rz\u00e9st haszn\u00e1l\u00f3 alkalmaz\u00e1sok t\u00e1mogat\u00e1s\u00e1t teszi lehet\u0151v\u00e9. Ez a funkci\u00f3 mag\u00e1ban foglalja a Jakarta Persistence ( 4.0 ) specifik\u00e1ci\u00f3j\u00e1nak interf\u00e9szeit, valamint a kont\u00e9ner \u00e1ltal kezelt perzisztencia-integr\u00e1ci\u00f3t. Alap\u00e9rtelmezett meg\u0151rz\u00e9sszolg\u00e1ltat\u00f3 megval\u00f3s\u00edt\u00e1sk\u00e9nt az EclipseLink szint\u00e9n rendelkez\u00e9sre \u00e1ll.
