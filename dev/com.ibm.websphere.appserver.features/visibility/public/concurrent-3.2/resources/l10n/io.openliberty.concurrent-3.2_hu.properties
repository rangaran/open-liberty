description=Ez a funkci\u00f3 lehet\u0151v\u00e9 teszi olyan fel\u00fcgyelt v\u00e9grehajt\u00f3k l\u00e9trehoz\u00e1s\u00e1t, amelyek seg\u00edts\u00e9g\u00e9vel az alkalmaz\u00e1sok p\u00e1rhuzamosan futtathat\u00f3 feladatokat adhatnak le, az alkalmaz\u00e1sszerver \u00e1ltal kezelt sz\u00e1lkontextusban. Ezenk\u00edv\u00fcl lehet\u0151v\u00e9 teszi a kezelt sz\u00e1lgy\u00e1rak l\u00e9trehoz\u00e1s\u00e1t is, amelyek olyan sz\u00e1lakat hoznak l\u00e9tre, amelyek a kezelt sz\u00e1lgy\u00e1rat lek\u00e9r\u0151 komponens sz\u00e1lkontextus\u00e1ban futnak.
