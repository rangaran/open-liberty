description=Ta funkcja umo\u017cliwia tworzenie zarz\u0105dzanych modu\u0142\u00f3w wykonawczych, kt\u00f3re pozwalaj\u0105 aplikacjom na przekazywanie zada\u0144 do r\u00f3wnoczesnego wykonywania, przy czym kontekst w\u0105tku jest zarz\u0105dzany przez serwer aplikacji. Umo\u017cliwia to r\u00f3wnie\u017c tworzenie zarz\u0105dzanych fabryk w\u0105tk\u00f3w w celu generowania w\u0105tk\u00f3w, kt\u00f3re dzia\u0142aj\u0105 w kontek\u015bcie w\u0105tku komponentu, kt\u00f3ry odwo\u0142uje si\u0119 do tej zarz\u0105dzanej fabryki w\u0105tk\u00f3w.
