description=Questa funzionalit\u00e0 consente la creazione di esecutori gestiti che permettono alle applicazioni di inviare attivit\u00e0 da eseguire in parallelo, con un contesto di thread gestito dal server delle applicazioni. Consente inoltre la creazione di factory di thread gestiti per generare thread che vengono eseguiti con il contesto di thread del componente che richiama la factory di thread gestita.
