description=Aceast\u0103 func\u021bionalitate permite crearea unor executori gestiona\u021bi, care permit aplica\u021biilor s\u0103 trimit\u0103 sarcini pentru a fi executate simultan, contextul de thread fiind gestionat de serverul de aplica\u021bii. De asemenea, permite crearea unor fabrici de fire gestionate pentru a genera fire care ruleaz\u0103 \u00een contextul de execu\u021bie al componentei care acceseaz\u0103 fabrica de fire gestionat\u0103.
