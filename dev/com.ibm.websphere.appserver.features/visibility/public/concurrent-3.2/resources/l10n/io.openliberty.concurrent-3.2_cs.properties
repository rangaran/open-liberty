description=Tato funkce umo\u017e\u0148uje vytv\u00e1\u0159et spravovan\u00e9 vykonavatele, d\u00edky nim\u017e mohou aplikace odes\u00edlat \u00fakoly k soub\u011b\u017en\u00e9mu zpracov\u00e1n\u00ed, p\u0159i\u010dem\u017e kontext vl\u00e1ken je spravov\u00e1n aplika\u010dn\u00edm serverem. Umo\u017e\u0148uje tak\u00e9 vytv\u00e1\u0159en\u00ed spravovan\u00fdch tokov\u00fdch tov\u00e1ren, kter\u00e9 slou\u017e\u00ed k vytv\u00e1\u0159en\u00ed vl\u00e1ken b\u011b\u017e\u00edc\u00edch v kontextu komponenty, kter\u00e1 danou spravovanou tokovou tov\u00e1rnu vyhled\u00e1v\u00e1.
