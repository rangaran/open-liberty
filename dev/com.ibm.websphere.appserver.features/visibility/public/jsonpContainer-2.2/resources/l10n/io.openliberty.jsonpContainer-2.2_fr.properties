description=La fonction Jakarta API for JSON Processing (JSON-P) fournit une m\u00e9thode normalis\u00e9e pour la construction et la manipulation de donn\u00e9es en vue de leur rendu au format JSON (JavaScript Object Notation). Lorsque cette fonction est activ\u00e9e, aucun fournisseur JSON-P n'est int\u00e9gr\u00e9. A la place, configurez un fournisseur JSON-P via un <bell> qui pointe vers une biblioth\u00e8que contenant le ou les fichiers JAR du fournisseur JSON-P.
