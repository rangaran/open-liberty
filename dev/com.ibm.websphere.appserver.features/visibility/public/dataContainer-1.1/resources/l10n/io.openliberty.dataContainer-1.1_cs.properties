description=Jakarta Data je programovac\u00ed model pro p\u0159\u00edstup k dat\u016fm. Pomoc\u00ed Jakarta Data m\u016f\u017eete data reprezentovat pomoc\u00ed objekt\u016f jazyka Java, tzv. entit, a operace s daty definovat jako metody rozhran\u00ed repozit\u00e1\u0159e. Poskytovatel dat z Jakarty dod\u00e1v\u00e1 aplikaci implementaci \u00falo\u017ei\u0161t\u011b. Funkce \u201e dataContainer-1.1 \u201c zahrnuje pouze rozhran\u00ed specifikace Jakarta Data 1.1. Funkce \u201e dataContainer-1.1 \u201c neobsahuje datov\u00fd zdroj Jakarta.
