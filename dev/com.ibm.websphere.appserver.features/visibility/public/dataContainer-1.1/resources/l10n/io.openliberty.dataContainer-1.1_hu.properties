description=A Jakarta Data egy adat-hozz\u00e1f\u00e9r\u00e9si programoz\u00e1si modell. A Jakarta Data seg\u00edts\u00e9g\u00e9vel az adatokat \u201eentit\u00e1soknak\u201d nevezett Java-objektumokkal \u00e1br\u00e1zolhatja, az adatokon v\u00e9grehajtand\u00f3 m\u0171veleteket pedig egy adatt\u00e1r-interf\u00e9sz met\u00f3dusaik\u00e9nt defini\u00e1lhatja. A Jakarta Data szolg\u00e1ltat\u00f3 biztos\u00edtja az adatt\u00e1r megval\u00f3s\u00edt\u00e1s\u00e1t egy alkalmaz\u00e1s sz\u00e1m\u00e1ra. Az \u201e dataContainer-1.1 \u201d funkci\u00f3 kiz\u00e1r\u00f3lag a Jakarta Data 1.1 -specifik\u00e1ci\u00f3 interf\u00e9szeit tartalmazza. Az \u201e dataContainer-1.1 \u201d funkci\u00f3 nem tartalmaz Jakarta Data szolg\u00e1ltat\u00f3t.
