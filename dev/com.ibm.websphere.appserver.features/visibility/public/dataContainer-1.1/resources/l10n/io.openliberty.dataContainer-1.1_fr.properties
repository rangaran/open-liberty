description=Jakarta Data est un mod\u00e8le de programmation destin\u00e9 \u00e0 l'acc\u00e8s aux donn\u00e9es. Vous pouvez utiliser Jakarta Data pour repr\u00e9senter des donn\u00e9es \u00e0 l'aide d'objets Java appel\u00e9s \u00ab entit\u00e9s \u00bb et pour d\u00e9finir des op\u00e9rations sur ces donn\u00e9es sous forme de m\u00e9thodes d'une interface de r\u00e9f\u00e9rentiel. Un fournisseur de donn\u00e9es Jakarta fournit l'impl\u00e9mentation du r\u00e9f\u00e9rentiel \u00e0 une application. La fonctionnalit\u00e9 \u00ab dataContainer-1.1 \u00bb inclut uniquement les interfaces de la sp\u00e9cification Jakarta Data 1.1. La fonctionnalit\u00e9 \u00ab dataContainer-1.1 \u00bb ne comprend pas de fournisseur de donn\u00e9es Jakarta.
