description=Jakarta Data to model programowania s\u0142u\u017c\u0105cy do uzyskiwania dost\u0119pu do danych. Za pomoc\u0105 Jakarta Data mo\u017cna przedstawia\u0107 dane za pomoc\u0105 obiekt\u00f3w Java zwanych encjami oraz definiowa\u0107 operacje na danych jako metody interfejsu repozytorium. Dostawca danych z D\u017cakarty dostarcza aplikacji implementacj\u0119 repozytorium. Funkcja \u201e dataContainer-1.1 \u201d obejmuje wy\u0142\u0105cznie interfejsy okre\u015blone w specyfikacji Jakarta Data 1.1. Funkcja \u201e dataContainer-1.1 \u201d nie obejmuje dostawcy danych Jakarta.
