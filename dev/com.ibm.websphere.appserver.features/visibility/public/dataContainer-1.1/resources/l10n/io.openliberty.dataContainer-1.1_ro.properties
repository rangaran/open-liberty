description=Jakarta Data este un model de programare pentru accesul la date. Pute\u021bi utiliza Jakarta Data pentru a reprezenta datele prin obiecte Java numite entit\u0103\u021bi \u0219i pentru a defini opera\u021biuni asupra datelor ca metode ale unei interfe\u021be de tip \u201erepository\u201d. Un furnizor de date din Jakarta pune la dispozi\u021bia unei aplica\u021bii implementarea unui depozit de date. Func\u021bia \u201e dataContainer-1.1 \u201d include doar interfe\u021bele din specifica\u021bia Jakarta Data 1.1. Func\u021bia \u201e dataContainer-1.1 \u201d nu include un furnizor de date Jakarta.
