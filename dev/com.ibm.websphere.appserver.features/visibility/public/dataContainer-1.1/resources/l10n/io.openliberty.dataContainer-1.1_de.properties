description=Jakarta Data ist ein Programmiermodell f\u00fcr den Datenzugriff. Mit Jakarta Data k\u00f6nnen Sie Daten mithilfe von Java-Objekten, sogenannten Entit\u00e4ten, darstellen und Operationen auf Daten als Methoden einer Repository-Schnittstelle definieren. Ein Jakarta-Datenanbieter stellt die Repository-Implementierung f\u00fcr eine Anwendung bereit. Die Funktion \u201e dataContainer-1.1 \u201c umfasst ausschlie\u00dflich die Schnittstellen der Jakarta Data 1.1 -Spezifikation. Die Funktion \u201e dataContainer-1.1 \u201c enth\u00e4lt keinen Jakarta-Datenanbieter.
