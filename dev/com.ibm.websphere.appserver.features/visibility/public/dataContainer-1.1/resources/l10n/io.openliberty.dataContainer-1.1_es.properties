description=Jakarta Data es un modelo de programaci\u00f3n para el acceso a datos. Puedes utilizar Jakarta Data para representar datos mediante objetos Java denominados \u00abentidades\u00bb y para definir operaciones sobre los datos como m\u00e9todos de una interfaz de repositorio. Un proveedor de datos de Jakarta proporciona la implementaci\u00f3n del repositorio a una aplicaci\u00f3n. La funci\u00f3n \u00ab dataContainer-1.1 \u00bb solo incluye las interfaces de la especificaci\u00f3n Jakarta Data 1.1. La funci\u00f3n \u00ab dataContainer-1.1 \u00bb no incluye un proveedor de datos de Jakarta.
