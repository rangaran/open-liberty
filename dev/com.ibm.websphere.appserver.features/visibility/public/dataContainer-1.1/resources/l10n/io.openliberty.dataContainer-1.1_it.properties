description=Jakarta Data \u00e8 un modello di programmazione per l'accesso ai dati. \u00c8 possibile utilizzare Jakarta Data per rappresentare i dati tramite oggetti Java denominati "entit\u00e0" e per definire le operazioni sui dati come metodi di un'interfaccia di repository. Un fornitore di dati di Giacarta fornisce l'implementazione del repository a un'applicazione. La funzionalit\u00e0 " dataContainer-1.1 " include solo le interfacce della specifica Jakarta Data 1.1. La funzionalit\u00e0 " dataContainer-1.1 " non include un provider di dati Jakarta.
