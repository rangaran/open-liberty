data=Integrierter Jakarta-Datenanbieter
data.desc=Konfiguriert den integrierten Jakarta-Datenanbieter

createTables=Tabellen erstellen
createTables.desc=Legt das Standardverhalten f\u00fcr die Tabellenerstellung von Entit\u00e4ten in Jakarta-Datenrepositorien fest, wenn das Repository-Attribut dataStore auf eine DataSource verweist. Diese Einstellung wird ignoriert, wenn ` dataStore eine Referenz auf eine Persistenzeinheit ist; in diesem Fall richtet sich die Tabellenerstellung nach properties.This der Persistenzeinheit. Sie wird auch ignoriert, wenn ` dataStore die ID eines databaseStore,in diesem Fall richtet sich die Tabellenerstellung nach der configuration.The des databaseStore Standardm\u00e4\u00dfig wird versucht, tables.Disable zu erstellen. Deaktivieren Sie diese Einstellung aus Performancegr\u00fcnden, nachdem die Tabellen created.If wurden. Falls der Datenbankbenutzer keine Berechtigung zum Erstellen von Tabellen besitzt, kann das Tool theddlGen verwendet werden, um DDL-Anweisungen f\u00fcr den Datenbankadministrator zu generieren.
 
dropTables=Tabellen l\u00f6schen
dropTables.desc=Legt das Standardverhalten fest, ob Tabellen f\u00fcr Entit\u00e4ten in Jakarta-Datenrepositorys entfernt werden sollen, wenn das Repository-Attribut \u201e dataStore \u201c auf eine \u201e DataSource.This\u201c-Einstellung verweist. Diese Einstellung wird ignoriert, wenn \u201e dataStore \u201c eine Persistence-Unit-Referenz ist; in diesem Fall wird das Entfernen von Tabellen durch die Persistence-Unit-Einstellung \u201e properties.This \u201c bestimmt. Diese Einstellung wird ebenfalls ignoriert, wenn \u201e dataStore \u201c die ID einer \u201e databaseStore,in \u201c ist; in diesem Fall wird das Entfernen von Tabellen durch die Einstellung \u201e databaseStore \u201c bestimmt. configuration.The Der Standardwert f\u00fcr diese Einstellung ist, dass Tabellen nicht entfernt werden.
 
logValues=Protokollwerte
logValues.desc=Liste der vollst\u00e4ndig qualifizierten Namen von Repository-Schnittstellen, Methoden oder Paketen, f\u00fcr die Daten protokolliert werden sollen, die an die Schnittstelle \u201e repository.Alternatively \u201c \u00fcbergeben werden; der Wert * gibt an, dass Werte f\u00fcr alle Methoden aller Schnittstellen \u201e repositories.The \u201c protokolliert werden sollen; standardm\u00e4\u00dfig werden keine Werte protokolliert. Diese Einstellung erm\u00f6glicht die Aktivierung f\u00fcr jedes Repository, jede Repository-Methode oder jedes Paket.
