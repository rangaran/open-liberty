data=Furnizor de date Jakarta integrat
data.desc=Configureaz\u0103 furnizorul de date Jakarta integrat

createTables=Creare tabele
createTables.desc=Stabile\u0219te comportamentul implicit privind \u00eencercarea de a crea tabele pentru entit\u0103\u021bile din depozitele de date Jakarta, \u00een cazul \u00een care atributul \u201e dataStore \u201d al depozitului indic\u0103 un \u201e DataSource \u201d.Aceast\u0103 setare este ignorat\u0103 atunci c\u00e2nd dataStore este o referin\u021b\u0103 la unitatea de persisten\u021b\u0103, caz \u00een care crearea tabelelor este determinat\u0103 de setarea properties.This a unit\u0103\u021bii de persisten\u021b\u0103. De asemenea, aceast\u0103 setare este ignorat\u0103 atunci c\u00e2nd dataStore este ID-ul unui databaseStore,in, caz \u00een care crearea tabelelor este determinat\u0103 de databaseStore configuration.The. Implicit, aceast\u0103 setare \u00eencearc\u0103 s\u0103 creeze tables.Disable. Din motive de performan\u021b\u0103, dup\u0103 ce tabelele sunt created.If, utilizatorul bazei de date nu are autoriza\u021bia de a crea tabele; theddlGen poate fi utilizat pen\
    tru a ob\u021bine DDL pe care administratorul bazei de date s\u0103 \u00eel execute.
 
dropTables=Abandonarea tabelelor
dropTables.desc=Stabile\u0219te comportamentul implicit privind eliminarea sau nu a tabelelor pentru entit\u0103\u021bile repozitoriilor de date Jakarta, dac\u0103 atributul dataStore repozitoriului indic\u0103 o DataSource. Aceast\u0103 setare este ignorat\u0103 atunci c\u00e2nd dataStore este o referin\u021b\u0103 a unit\u0103\u021bii de persisten\u021b\u0103, caz \u00een care eliminarea tabelului este determinat\u0103 de properties.This unit\u0103\u021bii de persisten\u021b\u0103. Aceast\u0103 setare este, de asemenea, ignorat\u0103 atunci c\u00e2nd dataStore este ID-ul unui databaseStore,in care eliminarea tabelului este determinat\u0103 de configuration.The databaseStore Valoarea implicit\u0103 pentru aceast\u0103 setare este s\u0103 nu se elimine tabelele.
 
logValues=Valori de jurnal
logValues.desc=Lista denumirilor complete ale interfe\u021belor, metodelor sau pachetelor din depozit pentru care se \u00eenregistreaz\u0103 datele furnizate c\u0103tre repository.Alternatively; valoarea * indic\u0103 \u00eenregistrarea valorilor pentru toate metodele din toate repositories.The. Implicit, valorile nu sunt \u00eenregistrate niciodat\u0103. Aceast\u0103 setare permite activarea op\u021biunii pentru fiecare depozit, metod\u0103 de depozit sau pachet.
