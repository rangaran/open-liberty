data=Proveedor de datos Jakarta integrado
data.desc=Configura el proveedor de datos Jakarta integrado

createTables=Crear tablas
createTables.desc=Establece el comportamiento predeterminado sobre si se debe intentar crear tablas para las entidades de los repositorios de datos de Jakarta en caso de que el atributo \u00ab dataStore \u00bb del repositorio apunte a un \u00ab DataSource \u00bb.Esta configuraci\u00f3n se ignora cuando dataStore es una referencia a una unidad de persistencia; en ese caso, la creaci\u00f3n de tablas viene determinada por la configuraci\u00f3n properties.This de la unidad de persistencia. Tambi\u00e9n se ignora cuando dataStore es el identificador de un databaseStore,in; en ese caso, la creaci\u00f3n de tablas viene determinada por la configuraci\u00f3n databaseStore configuration.The. El valor predeterminado de esta configuraci\u00f3n es intentar crear tables.Disable. Por motivos de rendimiento, esta configuraci\u00f3n se aplica una vez que las tablas se han created.If. Si el usuario de la base de datos no tiene permisos para crear tablas, se puede utilizar la herramienta theddlGen par\
    a obtener el DDL que el administrador de la base de datos deber\u00e1 ejecutar.
 
dropTables=Eliminar tablas
dropTables.desc=Establece el comportamiento predeterminado respecto a si se deben eliminar las tablas de las entidades de los repositorios de datos de Jakarta cuando el atributo ` dataStore ` del repositorio apunta a una ` DataSource.This`. Esta configuraci\u00f3n se ignora cuando ` dataStore ` es una referencia a una unidad de persistencia, en cuyo caso la eliminaci\u00f3n de tablas viene determinada por la configuraci\u00f3n de la unidad de persistencia ` properties.This `. Esta configuraci\u00f3n tambi\u00e9n se ignora cuando ` dataStore ` es el identificador de una ` databaseStore,in `, en cuyo caso la eliminaci\u00f3n de tablas viene determinada por la configuraci\u00f3n de la unidad de persistencia ` databaseStore ` ` configuration.The `. El valor predeterminado de esta configuraci\u00f3n es no eliminar las tablas.
 
logValues=Valores de registro
logValues.desc=Lista de nombres completos de interfaces, m\u00e9todos o paquetes de repositorios para los que se deben registrar los datos que se env\u00edan a repository.Alternatively; el valor * indica que se deben registrar los valores de todos los m\u00e9todos de todos los repositories.The. El valor predeterminado es no registrar nunca los valores. Esta configuraci\u00f3n permite activar la opci\u00f3n para cada repositorio, m\u00e9todo de repositorio o paquete.
