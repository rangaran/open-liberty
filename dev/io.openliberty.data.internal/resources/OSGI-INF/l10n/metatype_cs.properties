data=Integrovan\u00fd datov\u00fd zdroj Jakarta
data.desc=Nakonfiguruje vestav\u011bn\u00fd datov\u00fd zdroj Jakarta

createTables=Vytvo\u0159it tabulky
createTables.desc=Nastavuje v\u00fdchoz\u00ed chov\u00e1n\u00ed, zda se m\u00e1 pokusit o vytvo\u0159en\u00ed tabulek pro entity v \u00falo\u017ei\u0161t\u00edch dat Jakarta, pokud atribut ` dataStore ` \u00falo\u017ei\u0161t\u011b odkazuje na ` DataSource `.Toto nastaven\u00ed je ignorov\u00e1no, pokud je dataStore odkazem na jednotku perzistence; v takov\u00e9m p\u0159\u00edpad\u011b je vytv\u00e1\u0159en\u00ed tabulek ur\u010deno nastaven\u00edm properties.This jednotky perzistence. Toto nastaven\u00ed je rovn\u011b\u017e ignorov\u00e1no, pokud je dataStore identifik\u00e1torem databaseStore,in; v takov\u00e9m p\u0159\u00edpad\u011b je vytv\u00e1\u0159en\u00ed tabulek ur\u010deno nastaven\u00edm databaseStore configuration.The. V\u00fdchoz\u00ed hodnotou tohoto nastaven\u00ed je pokus o vytvo\u0159en\u00ed tables.Disable. Z d\u016fvodu v\u00fdkonu se toto nastaven\u00ed pou\u017eije a\u017e po created.If tabulek. Pokud datab\u00e1zov\u00fd u\u017eivatel nem\u00e1 opr\u00e1vn\u011bn\
    \u00ed k vytv\u00e1\u0159en\u00ed tabulek, lze pomoc\u00ed n\u00e1stroje theddlGen z\u00edskat DDL, kter\u00e9 m\u016f\u017ee spustit spr\u00e1vce datab\u00e1ze.
 
dropTables=Ru\u0161en\u00ed tabulek
dropTables.desc=Ur\u010duje v\u00fdchoz\u00ed chov\u00e1n\u00ed p\u0159i odstra\u0148ov\u00e1n\u00ed tabulek pro entity repozit\u00e1\u0159\u016f Jakarta Data, pokud atribut repozit\u00e1\u0159e dataStore odkazuje na DataSource. Toto nastaven\u00ed je ignorov\u00e1no, pokud je dataStore odkazem na jednotku perzistence, v takov\u00e9m p\u0159\u00edpad\u011b je odstra\u0148ov\u00e1n\u00ed tabulky ur\u010deno properties.This jednotky perzistence. Toto nastaven\u00ed je tak\u00e9 ignorov\u00e1no, pokud je dataStore ID \u00falo\u017ei\u0161t\u011b databaseStore,in takov\u00e9m p\u0159\u00edpad\u011b je odstra\u0148ov\u00e1n\u00ed tabulky ur\u010deno configuration.The databaseStore V\u00fdchoz\u00ed nastaven\u00ed pro toto nastaven\u00ed je tabulky neodstra\u0148ovat.
 
logValues=Zaznamenat hodnoty
logValues.desc=Seznam pln\u011b kvalifikovan\u00fdch n\u00e1zv\u016f rozhran\u00ed, metod nebo bal\u00ed\u010dk\u016f repozit\u00e1\u0159e, pro kter\u00e9 se maj\u00ed zaznamen\u00e1vat data p\u0159ed\u00e1van\u00e1 do slu\u017eby repository.Alternatively; hodnota * ozna\u010duje, \u017ee se maj\u00ed zaznamen\u00e1vat hodnoty pro v\u0161echny metody v\u0161ech repositories.The; v\u00fdchoz\u00ed nastaven\u00ed je, \u017ee se hodnoty nikdy nezaznamen\u00e1vaj\u00ed. Toto nastaven\u00ed umo\u017e\u0148uje aktivovat tuto funkci pro ka\u017ed\u00fd repozit\u00e1\u0159, metodu repozit\u00e1\u0159e nebo bal\u00ed\u010dek.
