#CMVCPATHNAME io.openliberty.data.internal/resources/OSGI-INF/l10n/metatype.properties
#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

data=Fournisseur de donn\u00e9es Jakarta int\u00e9gr\u00e9
data.desc=Configure le fournisseur de donn\u00e9es Jakarta int\u00e9gr\u00e9

createTables=Cr\u00e9ation de tables
createTables.desc=D\u00e9finit le comportement par d\u00e9faut concernant la cr\u00e9ation de tables pour les entit\u00e9s des r\u00e9f\u00e9rentiels de donn\u00e9es Jakarta lorsque l'attribut \u00ab dataStore \u00bb du r\u00e9f\u00e9rentiel pointe vers une DataSource.Ce param\u00e8tre est ignor\u00e9 lorsque l' dataStore est une r\u00e9f\u00e9rence d'unit\u00e9 de persistance, auquel cas la cr\u00e9ation de tables est d\u00e9termin\u00e9e par le param\u00e8tre properties.This de l'unit\u00e9 de persistance. Ce param\u00e8tre est \u00e9galement ignor\u00e9 lorsque l' dataStore est l'identifiant d'un databaseStore,in, auquel cas la cr\u00e9ation de tables est d\u00e9termin\u00e9e par le param\u00e8tre databaseStore configuration.The. Par d\u00e9faut, ce param\u00e8tre tente de cr\u00e9er des tables.Disable. Pour des raisons de performances, ce param\u00e8tre est d\u00e9sactiv\u00e9 une fois les tables created.If. Si l'utilisateur de la base de donn\u00e9es ne dispose pas des droits n\u00e9\
    cessaires pour cr\u00e9er des tables, l'outil theddlGen peut \u00eatre utilis\u00e9 pour obtenir le DDL que l'administrateur de la base de donn\u00e9es devra ex\u00e9cuter.
 
dropTables=Suppression de tables
dropTables.desc=D\u00e9finit le comportement par d\u00e9faut concernant la suppression des tables pour les entit\u00e9s des r\u00e9f\u00e9rentiels Jakarta Data lorsque l'attribut dataStore du r\u00e9f\u00e9rentiel pointe vers une DataSource. Ce param\u00e8tre est ignor\u00e9 lorsque ` dataStore est une r\u00e9f\u00e9rence d'unit\u00e9 de persistance; dans ce cas, la suppression des tables est d\u00e9termin\u00e9e par properties.This de l'unit\u00e9 de persistance. Ce param\u00e8tre est \u00e9galement ignor\u00e9 lorsque ` dataStore est l'identifiant d'un databaseStore,in ce cas, la suppression des tables est d\u00e9termin\u00e9e par la configuration.The databaseStore. Par d\u00e9faut, les tables ne sont pas supprim\u00e9es.
 
logValues=Valeurs des journaux
logValues.desc=Liste des noms complets d'interfaces, de m\u00e9thodes ou de paquets de r\u00e9f\u00e9rentiels pour lesquels il faut consigner les donn\u00e9es fournies \u00e0 l'interface repository.Alternatively; la valeur * indique qu'il faut consigner les valeurs pour toutes les m\u00e9thodes de tous les repositories.The. Par d\u00e9faut, aucune valeur n'est consign\u00e9e. Ce param\u00e8tre permet d'activer cette option pour chaque r\u00e9f\u00e9rentiel, m\u00e9thode de r\u00e9f\u00e9rentiel ou paquet.
