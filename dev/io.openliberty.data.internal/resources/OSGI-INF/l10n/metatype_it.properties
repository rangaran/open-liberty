data=Provider di dati Jakarta integrato
data.desc=Configura il provider di dati Jakarta integrato

createTables=Crea tabelle
createTables.desc=Stabilisce il comportamento predefinito relativo alla creazione delle tabelle per le entit\u00e0 dei repository Jakarta Data, qualora l'attributo ` dataStore ` del repository punti a un ` DataSource `.Questa impostazione viene ignorata quando l' dataStore \u00e8 un riferimento a un'unit\u00e0 di persistenza; in tal caso, la creazione della tabella \u00e8 determinata dall'impostazione properties.This dell'unit\u00e0 di persistenza. L'impostazione viene inoltre ignorata quando l' dataStore \u00e8 l'ID di un databaseStore,in; in tal caso, la creazione della tabella \u00e8 determinata dall'impostazione databaseStore. configuration.The Il valore predefinito per questa impostazione \u00e8 tentare di creare tables.Disable. Per motivi di prestazioni, dopo che le tabelle sono state created.If, l'utente del database non ha l'autorit\u00e0 di creare tabelle; \u00e8 possibile utilizzare lo strumento theddlGen per ottenere il DDL che l'amministratore del database dovr\u00e0 esegu\
    ire.
 
dropTables=Elimina tabelle
dropTables.desc=Definisce il comportamento predefinito per la rimozione delle tabelle per le entit\u00e0 dei repository di Jakarta Data se l'attributo dataStore del repository punta a un DataSource. Questa impostazione viene ignorata quando dataStore \u00e8 un riferimento a un'unit\u00e0 di persistenza, nel qual caso la rimozione delle tabelle \u00e8 determinata dalle properties.This dell'unit\u00e0 di persistenza. Questa impostazione viene inoltre ignorata quando dataStore \u00e8 l'ID di un databaseStore,in qual caso la rimozione delle tabelle \u00e8 determinata dalla configuration.The databaseStore Il valore predefinito per questa impostazione \u00e8 di non rimuovere le tabelle.
 
logValues=Valori di registro
logValues.desc=Elenco dei nomi completi di interfacce, metodi o pacchetti del repository per i quali registrare i dati forniti all' repository.Alternatively; il valore * indica di registrare i valori per tutti i metodi di tutti i pacchetti repositories.The. L'impostazione predefinita \u00e8 quella di non registrare mai i valori. Questa impostazione consente di abilitare l'opzione per ogni repository, metodo di repository o pacchetto.
