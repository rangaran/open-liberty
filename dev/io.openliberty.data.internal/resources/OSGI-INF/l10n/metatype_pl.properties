data=Wbudowany dostawca danych Jakarta
data.desc=Konfiguruje wbudowany dostawca danych Jakarta

createTables=Utw\u00f3rz tabele
createTables.desc=Okre\u015bla domy\u015blne zachowanie dotycz\u0105ce tego, czy nale\u017cy pr\u00f3bowa\u0107 tworzy\u0107 tabele dla encji w repozytoriach danych Jakarta, je\u015bli atrybut \u201e dataStore \u201d repozytorium wskazuje na adres DataSource.To ustawienie jest ignorowane, gdy dataStore jest odwo\u0142aniem do jednostki trwa\u0142o\u015bci, w kt\u00f3rym to przypadku tworzenie tabel jest okre\u015blane przez ustawienie properties.This jednostki trwa\u0142o\u015bci. Jest ono r\u00f3wnie\u017c ignorowane, gdy dataStore jest identyfikatorem databaseStore,in, w kt\u00f3rym to przypadku tworzenie tabel jest okre\u015blane przez databaseStore configuration.The. Domy\u015blnym zachowaniem dla tego ustawienia jest pr\u00f3ba utworzenia tables.Disable. Ze wzgl\u0119d\u00f3w wydajno\u015bciowych po utworzeniu tabel created.If u\u017cytkownik bazy danych nie ma uprawnie\u0144 do tworzenia tabel, theddlGen narz\u0119dzie mo\u017ce by\u0107 u\u017cyte do uzyskania DDL dla administr\
    atora bazy danych do uruchomienia.
 
dropTables=Usuwanie tabel
dropTables.desc=Okre\u015bla domy\u015blne zachowanie usuwania tabel dla jednostek repozytori\u00f3w danych Jakarta Data, je\u015bli atrybut dataStore repozytorium wskazuje na DataSource. To ustawienie jest ignorowane, gdy dataStore jest odwo\u0142aniem do jednostki trwa\u0142o\u015bci. W takim przypadku usuwanie tabeli jest okre\u015blane przez properties.This jednostki trwa\u0142o\u015bci. To ustawienie jest r\u00f3wnie\u017c ignorowane, gdy dataStore jest identyfikatorem databaseStore,in takim przypadku usuwanie tabeli jest okre\u015blane przez configuration.The databaseStore Domy\u015blnie dla tego ustawienia tabele nie s\u0105 usuwane.
 
logValues=Warto\u015bci dziennika
logValues.desc=Lista w pe\u0142ni kwalifikowanych nazw interfejs\u00f3w, metod lub pakiet\u00f3w repozytorium, dla kt\u00f3rych nale\u017cy rejestrowa\u0107 dane przekazywane do interfejsu repository.Alternatively; warto\u015b\u0107 * oznacza rejestrowanie warto\u015bci dla wszystkich metod wszystkich repositories.The; domy\u015blnie warto\u015bci nie s\u0105 rejestrowane. To ustawienie umo\u017cliwia wyra\u017cenie zgody dla ka\u017cdego repozytorium, metody repozytorium lub pakietu.
