data=Provedor de dados Jakarta integrado
data.desc=Configura o provedor de dados Jakarta integrado

createTables=Criar Tabelas
createTables.desc=Define o comportamento padr\u00e3o para determinar se deve-se tentar criar tabelas para entidades dos reposit\u00f3rios de dados do Jakarta, caso o atributo ` dataStore ` do reposit\u00f3rio aponte para um ` DataSource `.Essa configura\u00e7\u00e3o \u00e9 ignorada quando o dataStore \u00e9 uma refer\u00eancia a uma unidade de persist\u00eancia; nesse caso, a cria\u00e7\u00e3o da tabela \u00e9 determinada pela configura\u00e7\u00e3o properties.This da unidade de persist\u00eancia. A configura\u00e7\u00e3o tamb\u00e9m \u00e9 ignorada quando o dataStore \u00e9 o ID de um databaseStore,in; nesse caso, a cria\u00e7\u00e3o da tabela \u00e9 determinada pela configura\u00e7\u00e3o databaseStore configuration.The. O padr\u00e3o para essa configura\u00e7\u00e3o \u00e9 tentar criar tables.Disable essa configura\u00e7\u00e3o por motivos de desempenho ap\u00f3s as tabelas serem created.If. Se o usu\u00e1rio do banco de dados n\u00e3o tiver permiss\u00e3o para criar tabelas, a fer\
    ramenta theddlGen pode ser usada para obter o DDL para o administrador do banco de dados executar.
 
dropTables=Eliminar Tabelas
dropTables.desc=Define o comportamento padr\u00e3o de remo\u00e7\u00e3o de tabelas para entidades de reposit\u00f3rios do Jakarta Data caso o atributo dataStore do reposit\u00f3rio aponte para um DataSource. Essa configura\u00e7\u00e3o \u00e9 ignorada quando o dataStore \u00e9 uma refer\u00eancia de unidade de persist\u00eancia, caso em que a remo\u00e7\u00e3o da tabela \u00e9 determinada pelas properties.This da unidade de persist\u00eancia. Essa configura\u00e7\u00e3o tamb\u00e9m \u00e9 ignorada quando o dataStore \u00e9 o ID de um databaseStore,in que a remo\u00e7\u00e3o da tabela \u00e9 determinada pela configuration.The databaseStore O padr\u00e3o para essa configura\u00e7\u00e3o \u00e9 n\u00e3o remover tabelas.
 
logValues=Valores de registro
logValues.desc=Lista de nomes completos de interfaces, m\u00e9todos ou pacotes de reposit\u00f3rios para os quais devem ser registrados os dados fornecidos ao repository.Alternatively; o valor * indica que devem ser registrados os valores de todos os m\u00e9todos de todos os repositories.The; o padr\u00e3o \u00e9 nunca registrar valores. Esta configura\u00e7\u00e3o permite ativar essa op\u00e7\u00e3o para cada reposit\u00f3rio, m\u00e9todo de reposit\u00f3rio ou pacote.
