data=Be\u00e9p\u00edtett Jakarta adatforr\u00e1s
data.desc=Be\u00e1ll\u00edtja a be\u00e9p\u00edtett Jakarta Data szolg\u00e1ltat\u00f3t

createTables=T\u00e1bl\u00e1zatok l\u00e9trehoz\u00e1sa
createTables.desc=Meghat\u00e1rozza az alap\u00e9rtelmezett viselked\u00e9st arra vonatkoz\u00f3an, hogy a rendszer megk\u00eds\u00e9relje-e t\u00e1bl\u00e1k l\u00e9trehoz\u00e1s\u00e1t a Jakarta Data adatt\u00e1rak entit\u00e1saihoz, amennyiben az adatt\u00e1r \u201e dataStore \u201d attrib\u00fatuma egy \u201e DataSource \u201d elemre mutat.Ez a be\u00e1ll\u00edt\u00e1s figyelmen k\u00edv\u00fcl marad, ha a dataStore egy perzisztenciaegys\u00e9g-hivatkoz\u00e1s, ebben az esetben a t\u00e1bl\u00e1k l\u00e9trehoz\u00e1s\u00e1t a perzisztenciaegys\u00e9g properties.This be\u00e1ll\u00edt\u00e1sa hat\u00e1rozza meg. A be\u00e1ll\u00edt\u00e1s szint\u00e9n figyelmen k\u00edv\u00fcl marad, ha a dataStore egy databaseStore,in azonos\u00edt\u00f3ja, ebben az esetben a t\u00e1bl\u00e1k l\u00e9trehoz\u00e1s\u00e1t a databaseStore configuration.The be\u00e1ll\u00edt\u00e1s hat\u00e1rozza meg. A be\u00e1ll\u00edt\u00e1s alap\u00e9rtelmezett \u00e9rt\u00e9ke, hogy a teljes\u00edtm\u00e9ny okokb\u00f3\
    l megk\u00eds\u00e9relje l\u00e9trehozni a tables.Disable t\u00e1bl\u00e1kat. Ha a t\u00e1bl\u00e1k created.If ut\u00e1n az adatb\u00e1zis-felhaszn\u00e1l\u00f3 nem rendelkezik t\u00e1bl\u00e1k l\u00e9trehoz\u00e1s\u00e1ra vonatkoz\u00f3 jogosults\u00e1ggal, a theddlGen eszk\u00f6z haszn\u00e1lhat\u00f3 a DDL lek\u00e9r\u00e9s\u00e9re, amelyet az adatb\u00e1zis-adminisztr\u00e1tor futtathat.
 
dropTables=T\u00e1bl\u00e1k megsz\u00fcntet\u00e9se
dropTables.desc=Meghat\u00e1rozza az alap\u00e9rtelmezett viselked\u00e9st arra vonatkoz\u00f3an, hogy elt\u00e1vol\u00edts\u00e1k-e a Jakarta Data adatt\u00e1rak entit\u00e1sainak t\u00e1bl\u00e1it, ha az adatt\u00e1r dataStore attrib\u00fatuma a DataSource.This be\u00e1ll\u00edt\u00e1sra mutat. A be\u00e1ll\u00edt\u00e1s figyelmen k\u00edv\u00fcl marad, ha a dataStore egy perzisztenciaegys\u00e9g-hivatkoz\u00e1s; ebben az esetben a t\u00e1bl\u00e1k elt\u00e1vol\u00edt\u00e1s\u00e1t a perzisztenciaegys\u00e9g properties.This be\u00e1ll\u00edt\u00e1sa hat\u00e1rozza meg. A be\u00e1ll\u00edt\u00e1s szint\u00e9n figyelmen k\u00edv\u00fcl marad, ha a dataStore egy databaseStore,in azonos\u00edt\u00f3ja; ebben az esetben a t\u00e1bl\u00e1k elt\u00e1vol\u00edt\u00e1s\u00e1t a databaseStore configuration.The be\u00e1ll\u00edt\u00e1s hat\u00e1rozza meg. A be\u00e1ll\u00edt\u00e1s alap\u00e9rtelmezett \u00e9rt\u00e9ke a t\u00e1bl\u00e1k elt\u00e1vol\u00edt\u00e1s\u00e1nak mell\u0151z\u00e9se.
 
logValues=Napl\u00f3bejegyz\u00e9sek
logValues.desc=Azoknak a teljesen min\u0151s\u00edtett adatt\u00e1r-interf\u00e9szeknek, met\u00f3dusoknak vagy csomagoknak a list\u00e1ja, amelyek eset\u00e9ben napl\u00f3zni kell az repository.Alternatively -nek \u00e1tadott adatokat; a * jel azt jelenti, hogy az \u00f6sszes met\u00f3dus \u00e9rt\u00e9keit napl\u00f3zni kell ( repositories.The ). Az alap\u00e9rtelmez\u00e9s szerint soha nem ker\u00fclnek napl\u00f3z\u00e1sra az \u00e9rt\u00e9kek. Ez a be\u00e1ll\u00edt\u00e1s lehet\u0151v\u00e9 teszi az egyes t\u00e1rol\u00f3k, t\u00e1rol\u00e1si m\u00f3dszerek vagy csomagok eset\u00e9ben t\u00f6rt\u00e9n\u0151 enged\u00e9lyez\u00e9st.
