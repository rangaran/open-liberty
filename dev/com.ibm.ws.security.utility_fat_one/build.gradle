// Define commonly used directories
def puTestPublishDir = file("${projectDir}/publish")
def puTestFeatureDir = new File(puTestPublishDir, 'features')
def puTestBundleDir  = new File(puTestPublishDir, 'bundles')
def puTestFilesDir   = new File(puTestPublishDir, 'files')
def puCcBundleDir    = file("${projectDir}/../com.ibm.websphere.crypto.sample.customencryption/build/lib")
def puCcFeatureDir   = file("${projectDir}/../com.ibm.websphere.crypto.sample.customencryption/build/publish/usr/extension/lib/features")
def puCcExtensionDir = file("${projectDir}/../com.ibm.websphere.crypto.sample.customencryption/build/publish/bin/tools/extensions/ws-customPasswordEncryption")

configurations {
  requiredLibs {
    transitive = false
  }
}

dependencies {
  requiredLibs project(':com.ibm.ws.security.client_fat')
}

autoFVT.doLast {

  /*
   * Copy the custom encryption feature bundle and related files.
   */
  copy {
    from puCcBundleDir
    include 'com.ibm.websphere.crypto.sample.customencryption_1.0.jar'
    into puTestBundleDir
  }

  copy {
    from puCcFeatureDir
    include 'customEncryption-1.0.mf'
    into puTestFeatureDir
  }

  copy {
    from new File(puCcFeatureDir, 'l10n')
    include 'customEncryption-1.0.properties'
    into new File(puTestFeatureDir, 'l10n')
  }

  copy {
    from puCcExtensionDir
    include 'customEncryption.jar'
    into puTestFilesDir
  }

}