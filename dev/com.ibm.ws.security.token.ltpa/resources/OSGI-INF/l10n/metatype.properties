#===== LTPA TOKEN CONFIGURATION ====
ltpa.token.config=LTPA Token
ltpa.token.config.desc=Lightweight Third Party Authentication (LTPA) token configuration.

keysFileName=The LTPA primary keys file
keysFileName.desc=The path to the file that contains the LTPA primary keys, which are used to create and validate LTPA tokens.

keysPassword=LTPA primary keys password
keysPassword.desc=Password for the LTPA primary keys. If no value is specified, the 'ltpa_keys_password' or 'keystore_password' value from the ${server.config.dir}/server.env file is used if they are set. If both are set, the 'ltpa_keys_password' takes precedence over the 'keystore_password'. A password must be specified in this attribute, or in the 'ltpa_keys_password' or 'keystore_password' environment variables. The best practice is to encrypt the password by using the securityUtility tool.

expiration=LTPA token expiration
expiration.desc=Amount of time after which a token expires in seconds. The value can be specified in milliseconds, seconds, and minutes by using the following suffixes: "ms", "s", and "m".

ltpa.monitorInterval=LTPA keys file polling rate
ltpa.monitorInterval.desc=Rate at which the server checks for updates to the LTPA keys file. This rate applies to both the primary keys and the validation keys.

ltpa.monitorValidationKeysDir=LTPA monitor validation keys directory
ltpa.monitorValidationKeysDir.desc=If set to "true", the directory that contains LTPA primary keys is monitored for any modifications on files with the .keys suffix. The default value is false. All validation files must use the same password as the LTPA primary keys password and must have the .keys suffix.

ltpa.updateTrigger=LTPA keys update trigger
ltpa.updateTrigger.desc=Specifies the update method or trigger that is used to update the LTPA keys. The following values are supported: "polled", "mbean" and "disabled". The default value is "polled".
ltpa.updateTrigger.timed=The server scans for LTPA key file changes at the monitor interval and updates if the LTPA key files have any detectable changes. 
ltpa.updateTrigger.mbean=All the LTPA keys are reloaded when triggered by an MBean call. This is typically called by an external program, such as an integrated development environment or a management application.
ltpa.updateTrigger.disabled=This disables all update monitoring on all LTPA key files including primary key and validation keys (configured and non-configured). Changes to the LTPA key files are not applied while the server is running.

authFilterRef=Authentication Filter Reference
authFilterRef$Ref=Authentication filter reference
authFilterRef.desc=Specifies the authentication filter reference. 

validationKeys=LTPA Validation Keys
validationKeys.desc=The LTPA keys that are used only for validating existing LTPA tokens, not for creating new LTPA tokens.

fileName=LTPA validation keys file
fileName.desc=The name of the file that contains the LTPA validation keys. The path must be the same as the LTPA primary keys file.

password=LTPA validation keys password
password.desc=The password for the LTPA validation keys. The best practice is to encrypt the password by using the securityUtility tool.

validUntilDate=LTPA validation keys valid until date
validUntilDate.desc=A date and time value in ISO date format that the LTPA validation key is valid until. After the specified time, the validation keys is no longer used for LTPA token validation. The following example shows the ISO date format: "2023-11-18T18:08:35Z". If no value is specified, the LTPA validation keys can be used indefinitely.

#===== PQC LTPA TOKEN CONFIGURATION ====
tokenVersion=LTPA token version
tokenVersion.desc=The version of LTPA tokens to create. Version 2 uses classical cryptography (RSA-2048 + AES-128). Version 3 uses hybrid Post-Quantum Cryptography (RSA-2048 signatures + ML-KEM-768 encryption). Default is version 2 for backward compatibility.
tokenVersion.v2=LTPA Token Version 2 (Classical)
tokenVersion.v3=LTPA Token Version 3 (Post-Quantum)

pqcEnabled=Enable Post-Quantum Cryptography
pqcEnabled.desc=Enable Post-Quantum Cryptography (PQC) for LTPA tokens. When enabled, LTPA Token Version 3 will be used, which provides quantum-resistant security using ML-KEM (Module-Lattice-Based Key Encapsulation Mechanism) as specified in NIST FIPS 203. Requires Java 26 or later. Default is false.

pqcKeystoreFile=PQC keystore file
pqcKeystoreFile.desc=The path to the PKCS12 keystore file that contains the PQC keys (RSA-2048 + ML-KEM). This keystore is used for creating and validating LTPA Token Version 3. If the file does not exist, it will be created automatically with generated keys.

pqcKeystorePassword=PQC keystore password
pqcKeystorePassword.desc=Password for the PQC keystore file. If no value is specified, the 'pqc_keystore_password' value from the ${server.config.dir}/server.env file is used if set. A password must be specified in this attribute or in the environment variable. The best practice is to encrypt the password by using the securityUtility tool.

mlkemAlgorithm=ML-KEM algorithm variant
mlkemAlgorithm.desc=The ML-KEM (Module-Lattice-Based Key Encapsulation Mechanism) algorithm variant to use for quantum-resistant encryption. ML-KEM-512 provides NIST Level 1 security (~128-bit quantum), ML-KEM-768 provides NIST Level 3 security (~192-bit quantum), and ML-KEM-1024 provides NIST Level 5 security (~256-bit quantum). Default is ML-KEM-768, which provides strong quantum resistance with reasonable performance.
mlkemAlgorithm.512=ML-KEM-512 (NIST Level 1, ~128-bit quantum security)
mlkemAlgorithm.768=ML-KEM-768 (NIST Level 3, ~192-bit quantum security)
mlkemAlgorithm.1024=ML-KEM-1024 (NIST Level 5, ~256-bit quantum security)

cryptoMode=Cryptographic mode
cryptoMode.desc=The cryptographic mode for LTPA tokens. Classical mode uses only RSA-2048 signatures (LTPA v2 compatible). PQC mode uses only ML-DSA signatures (quantum-resistant). Hybrid mode uses both RSA-2048 and ML-DSA signatures for defense-in-depth. Default is classical for backward compatibility.
cryptoMode.classical=Classical (RSA-2048 only)
cryptoMode.pqc=Post-Quantum (ML-DSA only)
cryptoMode.hybrid=Hybrid (RSA-2048 + ML-DSA)

mldsaAlgorithm=ML-DSA algorithm variant
mldsaAlgorithm.desc=The ML-DSA (Module-Lattice-Based Digital Signature Algorithm) variant to use for quantum-resistant signatures. ML-DSA-44 provides NIST Level 2 security (~128-bit quantum), ML-DSA-65 provides NIST Level 3 security (~192-bit quantum), and ML-DSA-87 provides NIST Level 5 security (~256-bit quantum). Default is ML-DSA-65, which provides strong quantum resistance with reasonable signature size.
mldsaAlgorithm.44=ML-DSA-44 (NIST Level 2, ~128-bit quantum security, 2420 byte signatures)
mldsaAlgorithm.65=ML-DSA-65 (NIST Level 3, ~192-bit quantum security, 3309 byte signatures)
mldsaAlgorithm.87=ML-DSA-87 (NIST Level 5, ~256-bit quantum security, 4627 byte signatures)

mldsaKeystoreFile=ML-DSA keystore file
mldsaKeystoreFile.desc=The path to the PKCS12 keystore file that contains the ML-DSA keys for quantum-resistant signatures. This keystore is used in conjunction with the ML-KEM keystore to provide both quantum-resistant authentication (signatures) and confidentiality (encryption). If the file does not exist, it will be created automatically with generated keys.

mldsaKeystorePassword=ML-DSA keystore password
mldsaKeystorePassword.desc=Password for the ML-DSA keystore file. If no value is specified, the 'mldsa_keystore_password' value from the ${server.config.dir}/server.env file is used if set. A password must be specified in this attribute or in the environment variable. The best practice is to encrypt the password by using the securityUtility tool.