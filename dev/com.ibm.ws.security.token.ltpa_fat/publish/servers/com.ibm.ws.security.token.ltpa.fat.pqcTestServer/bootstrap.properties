# Bootstrap properties for LTPA PQC Test Server

# Use Java 26 for PQC support (ML-KEM)
# If Java 26 is not available, the server will fall back to RSA-only mode
com.ibm.ws.logging.trace.specification=*=info:com.ibm.ws.security.token.ltpa*=all:com.ibm.ws.security.token.ltpa.pqc*=all

# Enable PQC runtime detection
com.ibm.ws.security.ltpa.pqc.enabled=true

# Include FAT test port configuration
bootstrap.include=../testports.properties

