receivers:
 otlp:
   protocols:
     grpc:
       endpoint: 0.0.0.0:4317

exporters:
 prometheus:
   endpoint: otel-collector-metrics:3131
   resource_to_telemetry_conversion:
     enabled: true
   enable_open_metrics: true


processors:
 batch:
   timeout: 0s

service:
  telemetry:
    logs:
      level: "debug"
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
