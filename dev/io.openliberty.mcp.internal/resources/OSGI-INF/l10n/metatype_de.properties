mcpServer.name=Model Context Protocol (MCP)-Server
mcpServer.description=Konfigurieren Sie die MCP-Server-Funktion.

stateless.name=Stateless-Modus
stateless.description=Der stateless-Modus deaktiviert die MCP-Sitzungsverfolgung durch den Server. Dieser Modus macht die Sitzungsaffinität in einer Clusterumgebung überflüssig. Andernfalls bearbeitet derselbe Server Anfragen aus derselben MCP-Sitzung. Da keine Sitzungsdaten auf den Servern gespeichert werden, kann jede Serverinstanz jede Anfrage bearbeiten, was die Lastverteilung und horizontale Skalierung vereinfacht. Der stateless-Modus deaktiviert jedoch auch MCP-Funktionen, die auf der Sitzungsverfolgung oder der Verknüpfung separater HTTP -Anfragen basieren, wie beispielsweise das Abbrechen eines Toolaufrufs.

moduleName.name=Modulname
moduleName.description=Der Name des Moduls in einer EAR-Datei. Wählt das Modul aus, für das die Konfiguration gilt.

path.name=Endpunktpfad
path.description=Der Pfad „ URL “ für diesen MCP-Endpunkt, relativ zum Stammverzeichnis des Modulkontexts. Legt den Pfad zum MCP-Endpunkt innerhalb dieses Moduls fest.
