mcpServer.name=模型上下文協議 (MCP) 伺服器
mcpServer.description=設定 MCP 伺服器功能。

stateless.name=無狀態模式
stateless.description=無狀態模式會停用伺服器對 MCP 會話的追蹤功能。 此模式可消除叢集環境中對工作階段親和性的需求。 否則，同一台伺服器會處理來自相同 MCP 會話的請求。 由於伺服器上不儲存任何會話資料，任何伺服器實例皆可處理任何請求，這簡化了負載平衡與水平擴展的操作。 然而，無狀態模式也會停用依賴於會話追蹤或串聯獨立 HTTP 請求的MCP功能，例如取消工具呼叫。

moduleName.name=模組名稱
moduleName.description=EAR 檔案中的模組名稱。 選取此設定所適用的模組。

path.name=端點路徑
path.description=此 MCP 端點的 URL 路徑，以模組上下文根目錄為基準。 設定該模組內的 MCP 端點路徑。
