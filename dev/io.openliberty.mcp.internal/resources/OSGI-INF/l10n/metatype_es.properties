mcpServer.name=Servidor de protocolo de contexto de modelo (MCP)
mcpServer.description=Configure la función del servidor MCP.

stateless.name=Modo sin estado
stateless.description=El modo sin estado desactiva el seguimiento de sesiones MCP por parte del servidor. Este modo elimina la necesidad de afinidad de sesión en un entorno en clúster. De lo contrario, el mismo servidor gestiona las solicitudes de la misma sesión MCP. Dado que no se almacenan datos de sesión en los servidores, cualquier instancia del servidor puede gestionar cualquier solicitud, lo que simplifica el equilibrio de carga y el escalado horizontal. Sin embargo, el modo sin estado también deshabilita las funciones MCP que dependen del seguimiento de sesiones o de la vinculación de solicitudes HTTP independientes, como la cancelación de una llamada a una herramienta.

moduleName.name=Nombre de módulo
moduleName.description=El nombre del módulo en un archivo EAR. Selecciona el módulo al que se aplica la configuración.

path.name=Ruta del punto final
path.description=La ruta « URL » de este punto final MCP, relativa a la raíz del contexto del módulo. Establece la ruta del punto final MCP dentro de ese módulo.
