mcpServer.name=Server protokolu Model Context Protocol (MCP)
mcpServer.description=Nakonfigurujte funkci serveru MCP.

stateless.name=Režim bez stavu
stateless.description=Režim bez stavu zakáže serveru sledování relací MCP. Tento režim eliminuje potřebu afinity relace v clusterovém prostředí. V opačném případě zpracovává stejný server požadavky ze stejné relace MCP. Protože na serverech nejsou uložena žádná data o relacích, může jakákoli instance serveru zpracovat jakýkoli požadavek, což zjednodušuje vyvažování zatížení a horizontální škálování. Bezstavový režim však také deaktivuje funkce MCP, které se opírají o sledování relací nebo propojování samostatných požadavků HTTP, jako je například zrušení volání nástroje.

moduleName.name=Název modulu
moduleName.description=Název modulu v souboru EAR. Vybere modul, na který se konfigurace vztahuje.

path.name=Cesta ke koncovému bodu
path.description=Cesta typu „ URL “ pro tento koncový bod MCP, relativně k kořenovému adresáři kontextu modulu. Nastaví cestu ke koncovému bodu MCP v rámci daného modulu.
