mcpServer.name=Serveur MCP (Model Context Protocol)
mcpServer.description=Configurez la fonctionnalité Serveur MCP.

stateless.name=Mode sans état
stateless.description=Le mode sans état désactive le suivi des sessions MCP par le serveur. Ce mode supprime le besoin d''affinité de session dans un environnement en cluster. Sinon, le même serveur traite les requêtes provenant de la même session MCP. Comme aucune donnée de session n''est stockée sur les serveurs, n''importe quelle instance de serveur peut traiter n''importe quelle requête, ce qui simplifie l''équilibrage de charge et la mise à l''échelle horizontale. Cependant, le mode sans état désactive également les fonctionnalités MCP qui reposent sur le suivi des sessions ou la liaison entre différentes requêtes d'' HTTP, telles que l''annulation d''un appel d''outil.

moduleName.name=Nom du module
moduleName.description=Le nom du module dans un fichier EAR. Sélectionne le module auquel s''applique la configuration.

path.name=Chemin d''accès au point de terminaison
path.description=Le chemin d''accès « URL » pour ce point de terminaison MCP, par rapport à la racine du contexte du module. Définit le chemin d''accès au point de terminaison MCP au sein de ce module.
