mcpServer.name=Сервер протокола контекста модели (MCP)
mcpServer.description=Настройте функцию MCP Server.

stateless.name=Режим без состояния
stateless.description=Режим без состояния отключает отслеживание сеансов MCP сервером. Этот режим устраняет необходимость в привязке сеансов в кластерной среде. В противном случае один и тот же сервер обрабатывает запросы из одной и той же сессии MCP. Поскольку на серверах не хранятся данные сеансов, любой экземпляр сервера может обрабатывать любой запрос, что упрощает балансировку нагрузки и горизонтальное масштабирование. Однако режим без состояния также отключает функции MCP, которые зависят от отслеживания сеансов или связывания отдельных запросов HTTP, такие как отмена вызова инструмента.

moduleName.name=Имя модуля
moduleName.description=Имя модуля в файле EAR. Выбирает модуль, к которому применяется конфигурация.

path.name=Путь к конечной точке
path.description=Путь URL для этой конечной точки MCP, относительно корневого каталога модуля. Задает путь к конечной точке MCP в данном модуле.
