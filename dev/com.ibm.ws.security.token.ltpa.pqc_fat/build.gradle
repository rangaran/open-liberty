configurations {
  requiredLibs {
    transitive = false
  }
}

dependencies {
  requiredLibs 'org.apache.httpcomponents:httpclient:4.1.2',
               'org.apache.httpcomponents:httpcore:4.1.2',
               project(':io.openliberty.org.apache.commons.codec'),
               project(':com.ibm.websphere.javaee.servlet.3.0'),
               project(':com.ibm.ws.security.token.ltpa')
}

addRequiredLibraries.dependsOn addJakartaTransformer

/* 
 * This is where all application will be built.
 */
def appBuildDir = "${buildDir}/test-application"


/******************************************************************
 ******************************************************************
 **
 ** pqcLtpaTest.zip
 **
 ******************************************************************
 ******************************************************************/
task pqcLtpaTest(type: Zip, dependsOn: classes) {
  destinationDirectory = file("${appBuildDir}")
  archiveFileName = "pqcLtpaTest.zip"
  
  from('test-applications/pqcLtpaTest/resources') {
    include '**/*'
  }
  from ('build/classes/java/main') {
    include 'com/ibm/ws/security/token/ltpa/pqc/servlet/*.class'
    into 'WEB-INF/classes'
  }
}

assemble.dependsOn pqcLtpaTest

/******************************************************************
 ******************************************************************
 **
 ** Copy feature bundles and applications to specific servers.
 **
 ******************************************************************
 ******************************************************************/
autoFVT {
  doLast {
    
  /*
   * Copy pqcLtpaTest.war into test server.
   */
  def servers = [
    'com.ibm.ws.security.token.ltpa.pqc.fat'
  ]
  
  servers.each { server ->
    copy {
      from new File(buildDir, 'test-application/pqcLtpaTest.zip')
      into new File(autoFvtDir, 'publish/servers/' + server + '/apps')
      rename 'pqcLtpaTest.zip', 'pqcLtpaTest.war'
    }
  
    /*
     * Copy server.xml file from server directory.
     */
    copy { 
      from new File(projectDir, 'publish/servers/com.ibm.ws.security.token.ltpa.pqc.fat/server.xml')
      into new File(autoFvtDir, 'lib/LibertyFATTestFiles')
      rename 'server.xml', 'pqc.server.orig.xml'
    }
  }
  }
}
