#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile Health
mpHealth.desc=Configuration for MicroProfile Health.

checkInterval=File-based health check update interval
checkInterval.desc=The value that you specify sets the interval at which the health checks are queried for the file-based health checks. The value is a number followed by an optional time unit of ms for milliseconds or s for seconds. If no time unit is specified, the value is in seconds by default. If the value is 0, 0s, 0ms or is empty, then the file-based health check function is disabled.

startupCheckInterval=File-based health check startup interval
startupCheckInterval.desc=The specified value sets the interval at which health checks are queried until an UP status is resolved and the health check file is created. Specify the value as a number, optionally followed by a time unit: ms (milliseconds) or s (seconds). If you omit the time unit, the value defaults to milliseconds. If you omit the value entirely, the default interval is 100 ms.

enableEndpoints=Enable health check endpoints
enableEndpoints.desc=Controls whether health check endpoints are enabled. This setting takes effect only when file-based health checks are enabled. The default value is true. Set this value to false to disable the endpoints if file-based health checks are enabled.