# Custom FIPS configuration for JDBC + Kerberos (OpenJCEPlus + Sun)
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.desc.name = Custom OpenJCEPlusFIPS Cryptographic Module FIPS 140-3
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.extends = RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3
# JCE Providers
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.1 = com.ibm.crypto.plus.provider.OpenJCEPlus [ \
    {Cipher, AES, *, ModuleAndFullClassName:openjceplus/com.ibm.crypto.plus.provider.AESCipher}, \
    {Cipher, HmacSHA1, *, ModuleAndFullClassName:openjceplus/com.ibm.crypto.plus.provider.HmacSHA1}, \
    {Mac, HmacSHA1, *, ModuleAndFullClassName:openjceplus/com.ibm.crypto.plus.provider.HmacSHA1}, \
    {KeyGenerator, AES, *, ModuleAndFullClassName:openjceplus/com.ibm.crypto.plus.provider.AESKeyGenerator}, \
    {KeyGenerator, HmacSHA1, *, ModuleAndFullClassName:openjceplus/com.ibm.crypto.plus.provider.HmacSHA1KeyGenerator} \
]
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.2 = sun.security.provider.Sun [ \
    {MessageDigest, SHA-1, *, ModuleAndFullClassName:java.base/java.security.MessageDigest} \
]
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.3 = com.sun.crypto.provider.SunJCE [ \
    {AlgorithmParameters, PBES2, *, ModuleAndFullClassName:java.base/sun.security.pkcs12.PKCS12KeyStore}, \
    {SecretKeyFactory, PBEWithMD5AndDES, *, ModuleAndFullClassName:java.base/sun.security.pkcs12.PKCS12KeyStore} \
]
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.4 = sun.security.jgss.SunProvider
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.5 = com.ibm.security.jgss.IBMJGSSProvider
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.6 = sun.security.krb5.Krb5Provider
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.7 = com.ibm.crypto.plus.provider.OpenJCEPlus [ \
  {SecretKeyFactory, PBKDF2WithHmacSHA512, *, FullClassName:oracle.jdbc.driver.OracleDriver}, \
  {MessageDigest, SHA-1, *, FullClassName:oracle.jdbc.driver.OracleDriver}]