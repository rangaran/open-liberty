RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.desc.name = Custom OpenJCEPlusFIPS Cryptographic Module FIPS 140-3
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.extends = RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Strongly-Enforced
# the following is required for ojdbc username;password auth to work.
# TODO: investigate why OpenJCEPlusFIPS provider doesn't need to be subtracted.
RestrictedSecurity.OpenJCEPlusFIPS.FIPS140-3-Custom.jce.provider.3 = com.ibm.crypto.plus.provider.OpenJCEPlus [ \
  {SecretKeyFactory, PBKDF2WithHmacSHA512, *, FullClassName:oracle.jdbc.driver.OracleDriver}, \
  {MessageDigest, SHA-1, *, FullClassName:oracle.jdbc.driver.OracleDriver}]